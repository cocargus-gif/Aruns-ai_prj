<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pricing</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;background:#f6f7fb;}
.wrap{max-width:420px;margin:auto;padding:16px;}
.card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 8px 20px rgba(0,0,0,.06);}
h2{margin:0;font-size:18px;}
.sub{font-size:12px;color:#777;margin-bottom:12px;}
label{font-size:12px;font-weight:600;margin-top:10px;display:block;}
input,select{width:100%;padding:10px;border-radius:10px;border:1px solid #e5e7eb;margin-top:4px;font-size:14px;}
button{width:100%;padding:12px;border-radius:12px;border:none;margin-top:12px;font-weight:600;}
.primary{background:#111;color:#fff;}
.swap{background:#f1f5f9;}
.result{margin-top:12px;}
.item{padding:12px;border-radius:12px;background:#f9fafb;margin-top:8px;}
.best{border:1.5px solid #111;}
.ai{background:#eef2ff;padding:10px;border-radius:10px;font-size:12px;margin-top:10px;}
.footer{text-align:center;font-size:11px;color:#888;margin-top:10px;}
</style>
</head>
<body>

<div class="wrap">
<div class="card">

<h2>AI Pricing</h2>
<div class="sub">Smart logistics recommendation</div>

<label>Origin</label>
<input id="origin" value="DXB">

<label>Destination</label>
<input id="destination" value="SIN">

<button class="swap" onclick="swapRoute()">Swap</button>

<label>Mode</label>
<select id="mode">
<option>Air</option>
<option>Sea</option>
</select>

<label>Weight</label>
<input id="weight" type="number" value="150">

<label>Volume</label>
<input id="volume" type="number" value="2.5">

<label>Lead Time</label>
<input id="time" type="number" value="6">

<button class="primary" onclick="calculate()">Get Recommendation</button>

<div id="result" class="result"></div>

<div class="footer">Created by Arun</div>

</div>
</div>

<script>
function swapRoute(){
var o=document.getElementById("origin");
var d=document.getElementById("destination");
var t=o.value;o.value=d.value;d.value=t;
}

function num(id){
var v=document.getElementById(id).value;
if(v===""||isNaN(v)) return 0;
return parseFloat(v);
}

function calculate(){

var w=num("weight");
var v=num("volume");
var m=document.getElementById("mode").value;
var t=num("time");

var base=(m==="Air")?5:2;
var price=(w*base)+(v*50);

if(t<5) price*=1.2;
if(w>200) price*=0.9;

var list=[
{name:"DHL",p:price},
{name:"Emirates",p:price*0.95},
{name:"Qatar",p:price*1.05}
];

list.sort(function(a,b){return a.p-b.p;});

var rec=(m==="Air")?"Faster delivery recommended":"Cost-efficient option";
var conf=(w<200&&t>=5)?"High":"Medium";

var html="<div class='ai'>AI Insight: "+rec+"<br>Confidence: <b>"+conf+"</b></div>";

for(var i=0;i<list.length;i++){
html+="<div class='item "+(i===0?"best":"")+"'><b>"+list[i].name+"</b><br>$"+list[i].p.toFixed(2);
if(i===0){html+="<br><span style='color:green'>Best</span>";}
html+="</div>";
}

document.getElementById("result").innerHTML=html;
}
</script>

</body>
</html>

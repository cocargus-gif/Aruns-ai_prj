<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pricing Clean</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
background:#f4f6fb;
}

.container{
max-width:420px;
margin:auto;
padding:16px;
}

.card{
background:#fff;
border-radius:20px;
padding:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
overflow:hidden;
}

h2{margin:0;font-size:20px;}
.sub{font-size:12px;color:#777;margin-bottom:10px;}

label{
font-size:12px;
font-weight:600;
margin-top:10px;
display:block;
}

input,select{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #e5e7eb;
margin-top:5px;
background:#fafafa;
font-size:14px;
outline:none;
}

input:focus,select:focus{
border-color:#111;
background:#fff;
}

.row{
display:flex;
gap:10px;
}

button{
width:100%;
padding:14px;
border-radius:14px;
border:none;
margin-top:14px;
font-weight:600;
font-size:14px;
cursor:pointer;
}

.primary{
background:#111;
color:#fff;
}

.result{margin-top:15px;}

.box{
background:#f9fafb;
padding:12px;
border-radius:12px;
margin-top:10px;
}

.best{
border:2px solid #111;
background:#fff;
}

.small{font-size:12px;color:#666;}
.price{font-size:18px;font-weight:bold;}

.footer{
text-align:center;
font-size:11px;
color:#888;
margin-top:12px;
}
</style>

</head>
<body>

<div class="container">
<div class="card">

<h2>AI Pricing</h2>
<div class="sub">Clean & structured calculation</div>

<label>Route</label>
<div class="row">
<input id="origin" value="DXB">
<input id="destination" value="SIN">
</div>

<label>Mode</label>
<select id="mode">
<option>Air</option>
<option>Sea</option>
</select>

<div class="row">
<div style="flex:1;">
<label>Weight (kg)</label>
<input id="weight" type="number" value="150">
</div>

<div style="flex:1;">
<label>Volume (CBM)</label>
<input id="volume" type="number" value="2.5">
</div>
</div>

<label>Lead Time</label>
<input id="time" type="number" value="6">

<button id="calcBtn" class="primary">Calculate</button>

<div id="result" class="result"></div>

<div class="footer">Created by Arun</div>

</div>
</div>

<script>
function num(id){
var v=document.getElementById(id).value;
if(v===""||isNaN(v)) return 0;
return parseFloat(v);
}

document.getElementById("calcBtn").addEventListener("click", function(){

var w=num("weight");
var v=num("volume");
var t=num("time");
var m=document.getElementById("mode").value;

// Chargeable weight
var volumetric = v * 167;
var chargeable = Math.max(w, volumetric);

// Rates
var rate = (m==="Air") ? 4.5 : 1.8;
var freight = chargeable * rate;

// Surcharges
var fuel = freight * 0.12;
var handling = 50;
var urgency = (t < 5) ? freight * 0.15 : 0;

// Total
var total = freight + fuel + handling + urgency;

// Carriers
var carriers=[
{name:"DHL",total:total},
{name:"Emirates",total:total*0.95},
{name:"Qatar",total:total*1.05}
];

carriers.sort(function(a,b){return a.total-b.total;});

// UI Output
var html="";

html+="<div class='box'>";
html+="<div class='small'>Chargeable Weight</div>";
html+="<div class='price'>"+chargeable.toFixed(1)+" kg</div>";
html+="</div>";

html+="<div class='box'>";
html+="Freight: $"+freight.toFixed(2)+"<br>";
html+="Fuel: $"+fuel.toFixed(2)+"<br>";
html+="Handling: $"+handling+"<br>";
html+="Urgency: $"+urgency.toFixed(2);
html+="</div>";

for(var i=0;i<carriers.length;i++){
html+="<div class='box "+(i===0?"best":"")+"'>";
html+="<b>"+carriers[i].name+"</b><br>";
html+="<div class='price'>$"+carriers[i].total.toFixed(2)+"</div>";
if(i===0){
html+="<div class='small' style='color:green;'>Best Option</div>";
}
html+="</div>";
}

document.getElementById("result").innerHTML=html;

});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pricing Premium Layout</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
background: radial-gradient(circle at top, #1a1a1a, #000);
color:white;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.card{
position:relative;
background: linear-gradient(145deg, #0f0f0f, #1a1a1a);
border-radius:25px;
padding:20px;
box-shadow:0 0 25px rgba(255,120,0,0.1),0 15px 50px rgba(0,0,0,0.7);
overflow:hidden;
}

.glow{
position:absolute;
width:220px;
height:220px;
background: radial-gradient(circle, rgba(255,120,0,0.4), transparent);
filter: blur(70px);
top:-60px;
right:-60px;
}

h2{margin:0 0 10px;font-size:22px;}

label{font-size:13px;color:#ccc;margin-top:12px;display:block;}

input,select{
width:100%;
padding:14px;
border-radius:14px;
border:none;
margin-top:6px;
background:#111;
color:white;
font-size:15px;
}

.row{display:flex;gap:10px;}

button{
margin-top:18px;
padding:16px;
border-radius:20px;
border:none;
background:linear-gradient(135deg,#ff7a00,#ff3d00);
color:white;
font-weight:bold;
width:100%;
font-size:16px;
}

/* AI BOX */
.ai-box{
margin-top:15px;
padding:16px;
border-radius:18px;
background: linear-gradient(135deg, rgba(255,120,0,0.15), rgba(255,60,0,0.08));
border:1px solid rgba(255,120,0,0.3);
}

.ai-title{
font-weight:bold;
color:#ff7a00;
margin-bottom:8px;
font-size:14px;
}

.ai-title::before{
content:"";
display:inline-block;
width:8px;
height:8px;
background:#ff7a00;
border-radius:50%;
margin-right:6px;
}

.ai-text{font-size:15px;color:#eee;margin-bottom:8px;}
.ai-confidence{font-size:12px;color:#aaa;}

/* RESULT CARD */
.result-card{
margin-top:15px;
padding:16px;
border-radius:18px;
background: linear-gradient(145deg, #0f0f0f, #1a1a1a);
border:1px solid rgba(255,120,0,0.2);
}

.result-title{
color:#ff7a00;
font-weight:bold;
margin-bottom:10px;
font-size:14px;
}

.result-item{
background:#111;
padding:14px;
border-radius:14px;
margin-top:10px;
font-size:16px;
}

.best{
border:1px solid #ff7a00;
}

.footer{
text-align:center;
font-size:11px;
color:#777;
margin-top:12px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">
<div class="glow"></div>

<h2>AI Pricing</h2>

<label>Mode</label>
<select id="mode">
<option>Air</option>
<option>Sea</option>
</select>

<div class="row">
<div style="flex:1;">
<label>Weight</label>
<input id="weight" value="150">
</div>
<div style="flex:1;">
<label>Volume</label>
<input id="volume" value="2.5">
</div>
</div>

<label>Lead Time</label>
<input id="time" value="6">

<button

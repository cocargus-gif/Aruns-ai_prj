<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Logistics Pricing</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#eef2ff,#f8fafc);
}

.container {
    max-width:420px;
    margin:auto;
    padding:20px;
}

.card {
    background:white;
    border-radius:18px;
    padding:20px;
    box-shadow:0 15px 30px rgba(0,0,0,0.08);
}

.header {
    text-align:center;
    margin-bottom:15px;
}

.header h2 {
    margin:0;
}

.header span {
    font-size:13px;
    color:#666;
}

label {
    font-size:13px;
    font-weight:600;
    margin-top:10px;
    display:block;
}

input, select {
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
    margin-top:5px;
}

button {
    margin-top:15px;
    padding:14px;
    width:100%;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.primary {
    background:linear-gradient(135deg,#6366f1,#4f46e5);
    color:white;
}

.swap {
    background:#f1f5f9;
}

.result {
    margin-top:20px;
}

.result-card {
    background:#f9fafb;
    padding:15px;
    border-radius:14px;
    margin-top:10px;
}

.best {
    border:2px solid #6366f1;
}

.ai-box {
    background:#eef2ff;
    padding:12px;
    border-radius:12px;
    margin-top:15px;
    font-size:13px;
}

.footer {
    text-align:center;
    font-size:12px;
    margin-top:15px;
    color:#777;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="header">
    <h2>🚀 AI Pricing Tool</h2>
    <span>Smart logistics rate recommendation</span>
</div>

<label>Origin</label>
<input id="origin" value="DXB">

<label>Destination</label>
<input id="destination" value="SIN">

<button class="swap" onclick="swapRoute()">🔁 Swap Route</button>

<label>Mode</label>
<select id="mode">
    <option>Air</option>
    <option>Sea</option>
</select>

<label>Weight (kg)</label>
<input id="weight" type="number" value="150">

<label>Volume (CBM)</label>
<input id="volume" type="number" value="2.5">

<label>Lead Time</label>
<input id="time" type="number" value="6">

<button class="primary" onclick="calculate()">Generate AI Recommendation</button>

<div id="result" class="result"></div>

<div class="footer">Created by Arun</div>

</div>
</div>

<script>
function swapRoute(){
    let o=document.getElementById("origin");
    let d=document.getElementById("destination");
    [o.value,d.value]=[d.value,o.value];
}

function calculate(){

let weight=parseFloat(document.getElementById("weight").value);
let volume=parseFloat(document.getElementById("volume").value);
let mode=document.getElementById("mode").value;
let time=parseInt(document.getElementById("time").value);

// base logic
let baseRate= mode==="Air"?5:2;
let price=(weight*baseRate)+(volume*50);

// adjustments
if(time<5) price*=1.2;
if(weight>200) price*=0.9;

// carriers
let carriers=[
{name:"DHL Express",price:price},
{name:"Emirates SkyCargo",price:price*0.95},
{name:"Qatar Cargo",price:price*1.05}
];

// sort best
carriers.sort((a,b)=>a.price-b.price);

// AI reasoning
let recommendation = mode==="Air" 
? "Recommended due to faster delivery and moderate weight."
: "Sea is cost-efficient for this shipment profile.";

let confidence = weight<200 && time>=5 ? "High" : "Medium";

// UI render
let html=`<div class="ai-box">
🤖 AI Insight:<br>
${recommendation}<br>
Confidence: <b>${confidence}</b>
</div>`;

carriers.forEach((c,i)=>{
html+=`
<div class="result-card ${i===0?'best':''}">
<b>${c.name}</b><br>
$${c.price.toFixed(2)}
${i===0?"<br><span style='color:green'>Best Option</span>":""}
</div>`;
});

document.getElementById("result").innerHTML=html;
}
</script>

</body>
</html>
